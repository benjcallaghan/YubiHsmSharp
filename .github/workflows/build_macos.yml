name: Build on macOS

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build_macos:
    name: build on macos
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
          # - os: macos-15-xlarge

    steps:
      - name: install dependencies using brew
        run: brew install gengetopt help2man libedit opensc

      - name: clone the yubihsm-shell repository
        uses: actions/checkout@v7
        with:
          submodules: true
      
      - name: do build
        working-directory: yubihsm-shell
        env:
          VERBOSE: 1
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          cmake --build .

      - name: upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-lib
          path: yubihsm-shell/build/lib
