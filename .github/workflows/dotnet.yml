name: Build .NET

on:
  workflow_run:
    workflows: [Build Native]
    types: [completed]

jobs:
  build:
    name: build on ${{ matrix.os }}
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            rid: osx-x64
          - os: macos-15
            rid: osx-arm64
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-2025
            rid: win-x64

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Download Linux libraries
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          name: linux-lib
          path: artifacts/linux-x64

      - name: Download macOS x64 libraries
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          name: macos-intel-lib
          path: artifacts/osx-x64

      - name: Download macOS arm64 libraries
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          name: macos-arm-lib
          path: artifacts/osx-arm64

      - name: Download Windows libraries
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          name: windows-bin
          path: artifacts/win-x64

      - name: Test
        run: dotnet test --no-restore --configuration Release --runtime ${{ matrix.rid }} --verbosity normal --filter Requires!=YubiHSM
        # The SDK is available for limited testing, but not a full device.

      - name: Pack
        run: dotnet pack --no-build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: ./**/*.symbols.nupkg
